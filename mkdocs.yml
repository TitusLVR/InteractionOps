site_name: InteractionOps
site_description: Blender addon that boosts day-to-day interactivity via a small set of context-aware F1–F5 operators.
site_url: https://tituslvr.github.io/InteractionOps/
repo_url: https://github.com/TitusLVR/InteractionOps
repo_name: TitusLVR/InteractionOps
edit_uri: edit/master/docs/

docs_dir: docs
site_dir: site

exclude_docs: |
  superpowers/

theme:
  name: material
  language: en
  palette:
    - scheme: slate
      primary: deep orange
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light
    - scheme: default
      primary: deep orange
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.instant
    - navigation.tracking
    - toc.follow
    - content.code.copy
    - content.action.edit
    - search.suggest
    - search.highlight
    - search.share
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/TitusLVR/InteractionOps
    - icon: fontawesome/solid/cube
      link: https://blenderartists.org/t/interactionops-iops/

