[pytest]
# Keep rootdir at tests/ so pytest never builds a Package collector for the
# repo root (a Blender addon whose __init__.py imports `bpy`, unavailable
# outside Blender). `-p no:langsmith_plugin` skips a third-party plugin whose
# import is broken in this environment (pydantic-core mismatch), unrelated to
# these tests.
addopts = -p no:langsmith_plugin
